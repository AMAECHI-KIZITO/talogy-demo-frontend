<div class="root">
    <div class="body">
        <div class="top-wrapper">
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <span class="popup-header">Group Members</span>
                <span style="font-size: 12px; color: var(--text-color);">
                    Members of <strong>{{group.groupName || group.name}}</strong>
                </span>
            </div>
            <i class="ph-duotone ph-x cancel" (click)="close()"></i>
        </div>

        <div style="margin-top: 20px;">
            <div class="admin-table-search">
                <div class="search-icon">
                    <i class="ph ph-magnifying-glass"></i>
                </div>
                <input type="text" matInput placeholder="Search by email" [(ngModel)]="searchKey"
                    style="font-size: small;" (keyup)="applyFilter()">
            </div>
        </div>

        <div *ngIf="loading"
            style="display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 30px auto;">
            <app-loader></app-loader>
            <div style="font-size: 13px; margin-top: 10px; font-weight: 500; color: var(--primary-color);">
                Loading members...</div>
        </div>

        <div class="flex-center" style="padding: 40px 0;" *ngIf="!loading && error">
            <div class="empty-root">
                <div class="empty-state-header">Failed to load members</div>
                <button mat-flat-button color="primary" style="margin-top: 10px;" (click)="getMembers()">
                    Retry
                </button>
            </div>
        </div>

        <div class="flex-center" style="padding: 40px 0;" *ngIf="!loading && !error && memberList.length === 0">
            <div class="empty-root">
                <div class="empty-state-header">No members found</div>
                <div class="empty-semi-text">This group has no members yet</div>
            </div>
        </div>

        <div class="table-wrapper custom-scroll-bar" style="max-height: 50vh; margin-top: 15px;"
            [ngClass]="{hideElement: memberList.length === 0 || loading || error}">
            <table mat-table [dataSource]="listData" class="full-width table mat-elevation-z8" aria-label="members">

                <ng-container matColumnDef="email">
                    <th mat-header-cell *matHeaderCellDef>Email</th>
                    <td mat-cell *matCellDef="let row">
                        <span style="text-transform: lowercase;">{{row.useremail || row.email}}</span>
                    </td>
                </ng-container>

                <ng-container matColumnDef="status">
                    <th mat-header-cell *matHeaderCellDef>Status</th>
                    <td mat-cell *matCellDef="let row">
                        <span [ngClass]="{'approve': row.status === 'activated', 'reject': row.status !== 'activated'}">
                            {{row.status === 'activated' ? 'Active' : 'Inactive'}}
                        </span>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
            <mat-paginator [pageSizeOptions]="[10, 25]" showFirstLastButtons></mat-paginator>
        </div>
    </div>
</div>
