<div class="root">
    <div class="body">
        <div class="top-wrapper">
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <span class="popup-header">User Logs</span>
                <span style="font-size: 12px; ">Filter user login base on date.</span>
            </div>
            <i class="ph-duotone ph-x cancel" (click)="close()"></i>
        </div>

        <div style="margin-top: 20px; display: flex; justify-content: space-between; align-items: center;">
            <div class="admin-table-search">
                <div matPrefix class="search-icon">
                    <i class="ph ph-magnifying-glass"></i>
                </div>
                <input type="text" matInput placeholder="Search" [(ngModel)]="searchKey" style="font-size: small;"
                    (keyup)="applyFilters()">
            </div>

            <div style="display: flex; align-items: center; gap: 10px;">

                <mat-menu #exportMenu="matMenu">
                    <button mat-menu-item (click)="exportToExcel()">
                      <i class="ph-bold ph-file-xls"></i>
                      <span style="margin-left: 5px;">Export to Excel</span>
                    </button>
                    <button mat-menu-item (click)="exportToPDF()">
                      <i class="ph-bold ph-file-pdf"></i>
                      <span style="margin-left: 5px;">Export to PDF</span>
                    </button>
                  </mat-menu>
                  
                  <button mat-flat-button [matMenuTriggerFor]="exportMenu" style="background-color: transparent; border: 1px solid #ddd;">
                    <i class="ph-bold ph-export"></i>
                    <span class="add" style="margin-left: 5px; font-weight: 500;">Export</span>
                  </button>

                <button mat-flat-button color="primary" [matMenuTriggerFor]="menu">
                    <i class="ph-bold ph-funnel" [matMenuTriggerFor]="menu"></i>
                    <span class="add" style="margin-left: 5px;">Filter User</span>
                </button>
            </div>





        </div>
        <mat-menu #menu="matMenu" style="width: 50%;">
            <div (click)="$event.stopPropagation()" class="filter-form">
                <div class="popup-header">Filter User Logs</div>
                <form [formGroup]="filter" style="margin-top: 0px;">
                    <div class="mt-1">
                        <label for="startdate">Start Date</label>
                        <mat-form-field appearance="outline" floatLabel="never" style="font-size: small;"
                            class="custom-form-field">
                            <input (dateChange)="formatStartDate($event)" formControlName="startdate" matInput
                                [matDatepicker]="startDatePicker" placeholder="From">
                            <mat-datepicker-toggle matSuffix [for]="startDatePicker"></mat-datepicker-toggle>
                            <mat-datepicker #startDatePicker></mat-datepicker>
                        </mat-form-field>
                    </div>

                    <div class="mt-1">
                        <label for="enddate">End Date</label>
                        <mat-form-field appearance="outline" floatLabel="never" style="font-size: small;"
                            class="custom-form-field">
                            <input (dateChange)="formatEndDate($event)" formControlName="enddate" matInput
                                [matDatepicker]="doepicker" [min]="filter.value.startdate" placeholder="To">
                            <mat-datepicker-toggle matSuffix [for]="doepicker"></mat-datepicker-toggle>
                            <mat-datepicker #doepicker></mat-datepicker>
                        </mat-form-field>
                    </div>

                    <div class="submit-wrap">
                        <button mat-flat-button style="width: 100%;" color="primary" [disabled]="filter.invalid || loading" (click)="getList()">
                            <span class="btn-text" *ngIf="!loading">Filter</span>
                            <app-button-loader *ngIf="loading"></app-button-loader>
                        </button>
                    </div>


                </form>
            </div>


        </mat-menu>

        <div class="table-wrapper custom-scroll-bar" style="max-height: 60vh; margin-top: 20px;">

            <div *ngIf="loading"
                style="display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 20px auto; height: 60vh;">
                <app-loader></app-loader>
                <div style="font-size: 14px; margin-top: 10px; font-weight: 500; color: var(--primary-color);">
                    Just wait a moment...</div>
            </div>

            <div class="flex-center" style="height: 60vh;" *ngIf="!loading && userList.length === 0 && !error">
                <div class="empty-root">
                    <img src="assets/newbrandimg/empty-connector-list 1.png" class="empty-state-image"
                        alt="empty state image">
                    &nbsp;
                    <div class="empty-state-header">No Audit to Reveiw</div>

                </div>
            </div>
            <div class="error-block" style="height: 60vh;" *ngIf="!loading && error">
                <app-empty-list></app-empty-list>
                <button mat-flat-button color="primary" style="padding: 0 60px;" (click)="getList()">
                    Refresh
                </button>
            </div>


            <table [ngClass]="{hideElement: userList.length == 0 || loading}" mat-table [dataSource]="listUserData"
                class="full-width table" aria-label="rows">

                <ng-container matColumnDef="select">
                    <th mat-header-cell *matHeaderCellDef>
                        <mat-checkbox (change)="$event ? masterUserToggle() : null"
                            [checked]="selectionUser.hasValue() && isAllUserSelected()"
                            [indeterminate]="selectionUser.hasValue() && !isAllUserSelected()">
                        </mat-checkbox>
                    </th>
                    <td mat-cell *matCellDef="let element">
                        <mat-checkbox (click)="$event.stopPropagation()"
                            (change)="$event ? selectionUser.toggle(element) : null"
                            [checked]="selectionUser.isSelected(element)">
                        </mat-checkbox>
                    </td>
                </ng-container>

                <ng-container matColumnDef="email">
                    <th mat-header-cell *matHeaderCellDef>User Email</th>
                    <td mat-cell *matCellDef="let row">
                        <span style="font-weight: 600;">
                            {{row.userInvolved.useremail}}
                        </span>
                    </td>
                </ng-container>

                <ng-container matColumnDef="time">
                    <th mat-header-cell *matHeaderCellDef>Time (GMT)</th>
                    <td mat-cell *matCellDef="let row" style="text-transform: capitalize;">
                        {{row.timeStamp}}
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedUserColumns; sticky :true"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedUserColumns;"></tr>
            </table>
           
        </div>
        <mat-paginator #paginator style="margin: auto;" id="table-paginator"
        [ngClass]="{hideElement: userList.length == 0 || loading}" showFirstLastButtons
        [length]="userList.length" [pageIndex]="0" [pageSize]="10"
        [pageSizeOptions]="[5, 10, 25, 50, 100, 250]">
    </mat-paginator>
    </div>
</div>
