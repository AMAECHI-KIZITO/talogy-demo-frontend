
<mat-drawer-container class="root">
    <mat-drawer #drawer mode="over" position="end" class="custom-filter">
        <div class="filter-header flex-btw">
            <div style="font-weight: 600;">Filter Report</div>
            <button mat-icon-button (click)="drawer.toggle();" color="warn">
                <mat-icon>cancel</mat-icon>
            </button>
        </div>
        <div style="padding: 0 20px;">
            <form [formGroup]="filter" style="margin-top: 0px;">
                <mat-form-field floatLabel="never" style="font-size: small;" class="custom-form-field mt-1"
                    appearance="outline">
                    <span *ngIf="orgloading" matPrefix>
                        <mat-progress-spinner color="primary" diameter="18" mode="indeterminate">
                        </mat-progress-spinner>
                    </span>
                    <mat-select placeholder="Organisation" formControlName="org" style="font-size: small;">
                        <div class="custom-dropdown-search">
                            <div class="flex-btw">
                                <input #searchOrg placeholder="Search" type="text" class="selection-search"
                                    (keydown)="$event.stopPropagation()" (keyup)="onKeyOrg(searchOrg.value)">
                                <button mat-icon-button [ngClass]="{hideElement: searchOrg.value == ''}"
                                    (click)="searchOrg.value=''; reset()" matSuffix>
                                    <mat-icon style="font-size: 15px;">close</mat-icon>
                                </button>
                            </div>
                        </div>
                        <div class="custom-dropdown-options">
                            <mat-option style="background-color: whitesmoke;" *ngIf="orgList.length === 0">
                                --Empty--
                            </mat-option>
                            <mat-option [value]="type.organizationName" *ngFor="let type of orgList">
                                {{type.organizationName}}
                            </mat-option>
                        </div>

                    </mat-select>
                </mat-form-field>

                <div class="mt-2">
                    <button mat-raised-button class="full-width" color="primary" (click)="filterReport()">
                        <span *ngIf="!loading"> Apply </span>
                        <app-button-loader *ngIf="loading"></app-button-loader>
                    </button>
                </div>
            </form>

        </div>
    </mat-drawer>
    <div class="top-bar" style="margin-bottom: 20px;">
        <div class="flex-btw full-width">
            <div class="top-head">Report Management</div>
            <div>
                <button class="" mat-flat-button color="primary" (click)="cloneReport()">Embed Reports</button>
            </div>
        </div>
    </div>
    <div class="body-wrap">
        <div style="display: flex; gap: 10px; align-items: center;">
            <div class="admin-table-search">
                <div matPrefix class="search-icon">
                    <i class="ph ph-magnifying-glass"></i>
                </div>
                <input type="text" matInput placeholder="Search Report" [(ngModel)]="searchKey" style="font-size: small;"
                    (keyup)="applyFilters()">
            </div>
            <button mat-icon-button class="icon-button" (click)="getReport()" matTooltip="refresh">
                <i class="ph ph-arrows-clockwise"></i>
            </button>
    
            <button mat-icon-button class="icon-button" (click)="drawer.toggle();" matTooltip="filter">
                <i class="ph ph-funnel"></i>
            </button>
        </div>
       
        <div class="table-wrapper custom-scroll-bar" style="max-height: 55vh;">
            <div *ngIf="loading || filterLoading"
                style="display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 20px auto; height: 60vh;">
                <app-loader></app-loader>
                <div style="font-size: 14px; margin-top: 10px; font-weight: 500; color: var(--primary-color);">
                    Just wait a moment...</div>
            </div>
    
            <div class="flex-center" style="height: 40vh;" *ngIf="!loading && reportList.length === 0 && !reportError">
                <div class="empty-root">
                    <img src="assets/svg/reportempty.svg"
                        alt="empty state image">
                    &nbsp;
                    <div class="empty-state-header">No Report Created</div>
                    <!-- <div class="empty-semi-text">Create your first connector to start unlocking data insights
                    </div> -->
                    <!-- <button mat-flat-button color="primary" style="margin-top: 20px;" (click)="gotoRoute()">
                        <span class="btn-text">Create Connector</span>
                    </button> -->
    
                </div>
            </div>
            <div class="error-block" style="height: 60vh;" *ngIf="!loading && reportError">
                <app-empty-list></app-empty-list>
                <button mat-flat-button color="primary" style="padding: 0 60px;" (click)="getReport()">
                    Refresh
                </button>
            </div>
            <div class="card-wrapper" [ngClass]="{hideElement: reportList?.length == 0 || loading}">
                <div class="card-sub-wrap" *ngFor="let item of reportList; let row let i = index">
                    <div>
                        <button mat-icon-button color="primary" [matMenuTriggerFor]="menu"
                            style="display: flex; margin-left: auto;">
                            <i class="ph ph-dots-three-circle-vertical" style="font-size: 30px;"></i>
                        </button>
                        <div class="card-text" style="margin: 10px 0;">
                            <span class="header-text">Report Name</span>
                            <span class="inner-text">{{row.reportname}}</span>
                        </div>
                        <mat-menu #menu="matMenu">
                            <button mat-menu-item>
                                <div style="display: flex; align-items: center; color: var(--header-color);">
                                    <i class="ph-duotone ph-eye"></i>
                                    <span style="font-size: 12px; margin-left: 10px;">View More</span>
                                </div>
                            </button>
                        </mat-menu>
                    </div>
                    <div class="card-cont">
                        <!-- <div class="card-text">
                            <span class="header-text">Organization</span>
                            <span class="inner-text">{{row.client}}</span>
                        </div>
                        <div class="card-text">
                            <span class="header-text">Source</span>
                            <span class="inner-text">
                                {{row.reportsource}}
                            </span>
                        </div> -->
    
                        <div class="card-text">
                            <span class="header-text">Status</span>
                            <span class="inner-text"
                                [ngClass]="{'approve':row.status == 'enabled', 'reject':row.status != 'enabled'}">
                                {{row.status == 'enabled' ? "Connected" : "Not Connected"}}
                            </span>
                        </div>
                        <!-- <div class="card-text">
                            <span class="header-text">Created at</span>
                            <span class="inner-text">
                                {{row.createdat}}
                            </span>
                        </div> -->

                        <!-- <div class="card-text">
                            <span class="header-text">CreatedBy</span>
                            <span class="inner-text">{{row.reportuser?.useremail}}</span>
                        </div> -->
    
                    </div>
                </div>
            </div>
            <table [ngClass]="{hideElement: reportList?.length == 0 || loading}" mat-table [dataSource]="listData"
                class="full-width table mat-elevation-z8" aria-label="rows">

                <ng-container matColumnDef="select">
                    <th mat-header-cell *matHeaderCellDef>
                        <mat-checkbox (change)="$event ? masterToggle() : null"
                            [checked]="selection.hasValue() && isAllSelected()"
                            [indeterminate]="selection.hasValue() && !isAllSelected()">
                        </mat-checkbox>
                    </th>
                    <td mat-cell *matCellDef="let element">
                        <mat-checkbox (click)="$event.stopPropagation()"
                            (change)="$event ? selection.toggle(element) : null"
                            [checked]="selection.isSelected(element)">
                        </mat-checkbox>
                        <!-- <mat-checkbox [(ngModel)]="element.checked" (change)="employeeInfo($event, element)"></mat-checkbox> -->
                    </td>
                </ng-container>

                <ng-container matColumnDef="name">
                    <th mat-header-cell *matHeaderCellDef>Report Name</th>
                    <td mat-cell *matCellDef="let row">
                        {{row.reportname}}
                    </td>
                </ng-container>
    
                <!-- <ng-container matColumnDef="org">
                    <th mat-header-cell *matHeaderCellDef>Organization</th>
                    <td mat-cell *matCellDef="let row">
                        <div style="display: flex; align-items: center; gap: 10px; margin: 5px 0;">
                            <div class="acc1">{{getInitials(row.client)}}</div>
                            <span>{{row.client}}</span>
                        </div>
                        
                    </td>
                </ng-container> -->
    
                <!-- <ng-container matColumnDef="source">
                    <th mat-header-cell *matHeaderCellDef>Source</th>
                    <td mat-cell *matCellDef="let row">
                        <div style="display: flex; align-items: center; gap: 10px; margin: 5px 0;">
                            <span>{{row.reportsource}}</span>
                        </div>
                    </td>
                </ng-container> -->
    
                <ng-container matColumnDef="status">
                    <th mat-header-cell *matHeaderCellDef>Status</th>
                    <td mat-cell *matCellDef="let row">
                        <span [ngClass]="{'approve':row.status == 'enabled', 'reject':row.status != 'enabled'}">
                            {{row.status}}
                        </span>
    
                    </td>
                </ng-container>
    
                <!-- <ng-container matColumnDef="createdat">
                    <th mat-header-cell *matHeaderCellDef>Created at</th>
                    <td mat-cell *matCellDef="let row">
                        {{row.createdat}}
                    </td>
                </ng-container> -->

                <!-- <ng-container matColumnDef="createdby">
                    <th mat-header-cell *matHeaderCellDef>CreatedBy</th>
                    <td mat-cell *matCellDef="let row">
                        <span style="color: #2489ED;">{{row.reportuser?.useremail}}</span>
                      
                    </td>
                </ng-container> -->

                <ng-container matColumnDef="action">
                    <th mat-header-cell *matHeaderCellDef></th>
                    <td mat-cell *matCellDef="let row; let i = index" align="center">
                        <button mat-icon-button [matMenuTriggerFor]="menu">
                            <mat-icon>more_vert</mat-icon>
                        </button>
                        <mat-menu #menu="matMenu">
                            <button mat-menu-item (click)="delete(row)">
                                <div style="display: flex; align-items: center; color: var(--header-color);">
                                    <i class="ph-bold ph-trash"></i>
                                    <span style="font-size: 12px; margin-left: 10px;">Delete Report</span>
                                </div>
                            </button>
                            <button mat-menu-item [disabled]="pauseLoading" (click)="pauseReport(row)" *ngIf="row.status === 'enabled' ">
                                <div style="display: flex; align-items: center; color: var(--header-color);">
                                    <i class="ph-duotone ph-plugs"></i>
                                    <span style="font-size: 12px; margin-left: 10px;">Disable Report</span>
                                </div>
                                
                                <app-button-loader *ngIf="pauseLoading"></app-button-loader>
                            </button>
            
                            <button mat-menu-item (click)="pauseReport(row)" *ngIf="row.status === 'disabled' ">
                                <div style="display: flex; align-items: center; color: var(--header-color);">
                                    <i class="ph-duotone ph-plugs"></i>
                                    <span style="font-size: 12px; margin-left: 10px;">Enable Report</span>
                                </div>
                                <app-button-loader *ngIf="pauseLoading"></app-button-loader>
                            </button>
            
                            <!-- <button mat-menu-item (click)="cloneReport(row)">
                                <div style="display: flex; align-items: center; color: var(--header-color);">
                                    <i class="ph-duotone ph-plugs"></i>
                                    <span style="font-size: 12px; margin-left: 10px;">Embed Report</span>
                                </div>
                                <app-button-loader *ngIf="pauseLoading"></app-button-loader>
                            </button> -->
                           
                        </mat-menu>
                    </td>
                </ng-container>
                <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky :true"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
        </div>
        <div class="btn-wrap-page">
            <button mat-button (click)="previousReport()" [disabled]="reportCount <= 1">
                <i class="ph-bold ph-caret-left"></i>
                <span [ngClass]="{'nonext':reportCount <= 1 , 'next':reportCount > 1}">Previous</span>
            </button>
            <button mat-button (click)="nextReport()" [disabled]="isNext">
                <span [ngClass]="{'nonext': isNext , 'next': !isNext}">Next</span>
                <i class="ph-bold ph-caret-right"></i>
            </button>
        </div>
    </div>
</mat-drawer-container>
