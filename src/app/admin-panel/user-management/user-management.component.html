<div class="root">
    <div class="top-bar">
        <span class="top-head">User Management</span>
        <button mat-flat-button color="primary" (click)="inviteUser()">
            <i class="ph-bold ph-user-plus"></i>
            <span class="add">Invite User</span>
        </button>
    </div>

    <div class="body-wrap">
        <div class="admin-table-search">
            <div class="search-icon">
                <i class="ph ph-magnifying-glass"></i>
            </div>
            <input type="text" matInput placeholder="Search by email" [(ngModel)]="searchKey"
                style="font-size: small;" (keyup)="applyFilter()">
        </div>

        <div *ngIf="loading"
            style="display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 20px auto; height: 60vh;">
            <app-loader></app-loader>
            <div style="font-size: 14px; margin-top: 10px; font-weight: 500; color: var(--primary-color);">
                Just wait a moment...</div>
        </div>

        <div class="error-block" style="height: 60vh;" *ngIf="!loading && error">
            <app-empty-list></app-empty-list>
            <button mat-flat-button color="primary" style="padding: 0 60px;" (click)="getUsers()">
                Refresh
            </button>
        </div>

        <div class="flex-center" style="height: 60vh;" *ngIf="!loading && !error && userList.length === 0">
            <div class="empty-root">
                <div class="empty-state-header">No Users Found</div>
                <div class="empty-semi-text">Invite users to get started</div>
                <button mat-flat-button color="primary" style="margin-top: 20px;" (click)="inviteUser()">
                    <span class="btn-text">Invite User</span>
                </button>
            </div>
        </div>

        <div class="table-wrapper custom-scroll-bar" style="max-height: 65vh;"
            [ngClass]="{hideElement: userList.length === 0 || loading || error}">
            <table mat-table [dataSource]="listData" class="full-width table mat-elevation-z8" aria-label="rows">

                <ng-container matColumnDef="email">
                    <th mat-header-cell *matHeaderCellDef>Email</th>
                    <td mat-cell *matCellDef="let row">
                        <span style="text-transform: lowercase;">{{row.useremail}}</span>
                    </td>
                </ng-container>

                <ng-container matColumnDef="dateOnboarded">
                    <th mat-header-cell *matHeaderCellDef>Date Onboarded</th>
                    <td mat-cell *matCellDef="let row">
                        {{row.dateRegistered | date: 'mediumDate'}}
                    </td>
                </ng-container>

                <ng-container matColumnDef="status">
                    <th mat-header-cell *matHeaderCellDef>Status</th>
                    <td mat-cell *matCellDef="let row">
                        <span
                            [ngClass]="{'approve': row.status === 'activated', 'reject': row.status !== 'activated'}">
                            {{row.status === 'activated' ? 'Active' : 'Inactive'}}
                        </span>
                    </td>
                </ng-container>

                <ng-container matColumnDef="lastLogin">
                    <th mat-header-cell *matHeaderCellDef>Last Login</th>
                    <td mat-cell *matCellDef="let row">
                        {{row.lastLoginTimestamp | date: 'medium'}}
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
            <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons></mat-paginator>
        </div>
    </div>
</div>
