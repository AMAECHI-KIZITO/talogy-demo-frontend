<div class="root-wrap">
    <div class="header-wrap">
        <span class="header-name">Audit Details</span>
     
    </div>
    <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 20px;">
        <div class="admin-table-search">
            <div matPrefix class="search-icon">
                <i class="ph ph-magnifying-glass"></i>
            </div>
            <input type="text" matInput placeholder="Search" [(ngModel)]="searchKey" style="font-size: small;"
                (keyup)="applyFilters()">
        </div>
        <button mat-icon-button class="icon-button" style="margin-left: 5px;" (click)="getAudit()"
        matTooltip="refresh">
        <i class="ph ph-arrows-clockwise"></i>
    </button>
    </div>

    <div class="table-wrapper custom-scroll-bar" style="max-height: 60vh; margin-top: 20px;">
        <div *ngIf="loading" style="height: 60vh;">
            <ngx-skeleton-loader appearance="line" count="8" [theme]="{height: '30px'}"></ngx-skeleton-loader>
        </div>

        <div class="flex-center" style="height: 60vh;" *ngIf="!loading && auditList.length === 0 && !auditError">
            <div class="empty-root">
                <img src="assets/newbrandimg/empty-connector-list 1.png" class="empty-state-image"
                    alt="empty state image">
                &nbsp;
                <div class="empty-state-header">No Audit to Reveiw</div>

            </div>
        </div>
        <div class="error-block" style="height: 60vh;" *ngIf="!loading && auditError">
            <app-empty-list></app-empty-list>
            <button mat-flat-button color="primary" style="padding: 0 60px;" (click)="getAudit()">
                Refresh
            </button>
        </div>
        <div class="card-wrapper" [ngClass]="{hideElement: auditList?.length == 0 || loading}">
            <div class="card-sub-wrap" *ngFor="let item of auditList; let row let i = index">
                <div class="card-cont">
                    <div class="card-text">
                        <span class="header-text">User</span>
                        <span class="inner-text">{{row.userInvolved.useremail}}</span>
                    </div>
                    <div class="card-text">
                        <span class="header-text">Time</span>
                        <span class="inner-text">{{row.timeStamp}}</span>
                    </div>
                    <div class="card-text">
                        <span class="header-text">Description</span>
                        <span class="inner-text">{{row.description}}</span>
                    </div>
                </div>
            </div>
        </div>
        <table [ngClass]="{hideElement: auditList?.length == 0 || loading}" mat-table [dataSource]="auditData"
            class="full-width table mat-elevation-z8" aria-label="rows">

            <ng-container matColumnDef="select">
                <th mat-header-cell *matHeaderCellDef>
                    <mat-checkbox (change)="$event ? masterToggle() : null"
                        [checked]="selection.hasValue() && isAllSelected()"
                        [indeterminate]="selection.hasValue() && !isAllSelected()">
                    </mat-checkbox>
                </th>
                <td mat-cell *matCellDef="let element">
                    <mat-checkbox (click)="$event.stopPropagation()"
                        (change)="$event ? selection.toggle(element) : null" [checked]="selection.isSelected(element)">
                    </mat-checkbox>
                    <!-- <mat-checkbox [(ngModel)]="element.checked" (change)="employeeInfo($event, element)"></mat-checkbox> -->
                </td>
            </ng-container>

            <ng-container matColumnDef="email">
                <th mat-header-cell *matHeaderCellDef>User</th>
                <td mat-cell *matCellDef="let row">
                    <span style="font-weight: 600;">
                        {{row.userInvolved.useremail}}
                    </span>
                </td>
            </ng-container> 

            <ng-container matColumnDef="time">
                <th mat-header-cell *matHeaderCellDef>Time (GMT)</th>
                <td mat-cell *matCellDef="let row" style="text-transform: capitalize;">
                    {{row.timeStamp}}
                </td>
            </ng-container>

            <ng-container matColumnDef="description">
                <th mat-header-cell *matHeaderCellDef>Description<th>
                <td mat-cell *matCellDef="let row" style="text-transform: capitalize;">
                    {{row.description}}
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky :true"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
        
    </div>
</div>
