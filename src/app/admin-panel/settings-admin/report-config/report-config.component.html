<mat-drawer-container>
    <mat-drawer #drawer mode="over" position="end" class="custom-filter">
        
    </mat-drawer>
    <div style="display: flex; gap: 10px; align-items: center; justify-content: space-between; margin-bottom: 20px;">
        <div class="admin-table-search">
            <div matPrefix class="search-icon">
                <i class="ph ph-magnifying-glass"></i>
            </div>
            <input type="text" matInput placeholder="Search Connector" 
                style="font-size: small;">
        </div>
        <button mat-icon-button class="icon-button" matTooltip="refresh">
            <i class="ph ph-arrows-clockwise"></i>
        </button>

        <button mat-icon-button class="icon-button" (click)="drawer.toggle();" matTooltip="filter">
            <i class="ph ph-funnel"></i>
        </button>

         <button mat-flat-button color="primary" (click)="config()">
            <img src="assets/svg/addbtn.svg" alt="">
            Configure New Template
        </button>
    </div>

    <div style="display: flex; flex-direction: column; justify-content: space-between;">
        <div style="height: 55vh;" class="table-wrapper custom-scroll-bar">
           
            <table mat-table
                [dataSource]="listData" class="full-width table mat-elevation-z8" aria-label="rows">

                <ng-container matColumnDef="select">
                    <th mat-header-cell *matHeaderCellDef>
                        <mat-checkbox (change)="$event ? masterToggle() : null"
                            [checked]="selection.hasValue() && isAllSelected()"
                            [indeterminate]="selection.hasValue() && !isAllSelected()">
                        </mat-checkbox>
                    </th>
                    <td mat-cell *matCellDef="let element">
                        <mat-checkbox (click)="$event.stopPropagation()"
                            (change)="$event ? selection.toggle(element) : null"
                            [checked]="selection.isSelected(element)">
                        </mat-checkbox>

                    </td>
                </ng-container>

                <ng-container matColumnDef="name">
                    <th mat-header-cell *matHeaderCellDef>Name</th>
                    <td mat-cell *matCellDef="let row">
                        <span>
                            {{row.name}}
                        </span>
                    </td>
                </ng-container>


                <ng-container matColumnDef="status">
                    <th mat-header-cell *matHeaderCellDef>Status</th>
                    <td mat-cell *matCellDef="let row">
                        <span
                            [ngClass]="{'approve':row.status == 'Active', 'reject':row.status == 'Inactive'}">
                            {{row.status}}
                        </span>

                    </td>
                </ng-container>


                <ng-container matColumnDef="action">
                    <th mat-header-cell *matHeaderCellDef></th>
                    <td mat-cell *matCellDef="let row; let i = index" align="center">
                        <button mat-icon-button [matMenuTriggerFor]="menu">
                            <mat-icon>more_vert</mat-icon>
                        </button>
                        <mat-menu #menu="matMenu">
                            <button mat-menu-item>
                                <div style="display: flex; align-items: center;">
                                    <i class="ph-bold ph-pencil"></i>
                                    <span style="font-size: 12px; margin-left: 10px;">Change Status</span>
                                </div>
                            </button>
                            <button mat-menu-item>
                                <div style="display: flex; align-items: center; color: red;">
                                    <i class="ph-bold ph-trash"></i>
                                    <span style="font-size: 12px; margin-left: 10px;">Delete</span>
                                </div>
                            </button>
                         
                        </mat-menu>
                    </td>
                </ng-container>
                <tr mat-header-row *matHeaderRowDef="displayedColumnsBasic; sticky :true"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumnsBasic;"></tr>
            </table>
        </div>
       

    </div>
</mat-drawer-container>
