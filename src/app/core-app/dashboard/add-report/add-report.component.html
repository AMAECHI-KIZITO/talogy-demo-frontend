<div class="root">
    <div class="header-wrapper">
        <span class="connect">Add new Report</span>
        <div class="close" (click)="close()">
            <span class="cancel">x</span>
        </div>
    </div>
    <div class="divider"></div>
    <div class="body">
        <form class="form-wrapper form" [formGroup]="form">
            <label for="name">Report Name</label>
            <mat-form-field appearance="outline" style="margin-bottom: 10px;">
                <input type="text" formControlName= "name" matInput>
            </mat-form-field>

            <div class="flex-btw mt-1">
                <div class="split-el">
                    <label for="name">Report Type</label>
                    <mat-form-field appearance="outline" style="margin-bottom: 10px;">
                        <input type="text" formControlName= "reporttype" matInput>
                    </mat-form-field>
                </div>
                <div class="split-el">
                    <label for="name">Report Source</label>
                    <mat-form-field appearance="outline" style="margin-bottom: 10px;">
                        <input type="text" formControlName= "reportsource" matInput>
                    </mat-form-field>
                </div>
            </div>

           

            
            <!-- <mat-form-field appearance="outline" style="margin-bottom: 10px;">
                <mat-select placeholder="--Select report type--" formControlName="reporttype">
                    <mat-option [value]="type.value" *ngFor="let type of reportType">
                        {{type.name}}
                    </mat-option>
                </mat-select>
            </mat-form-field> -->

            <label for="name">Report Id</label>
            <mat-form-field appearance="outline" style="margin-bottom: 10px;">
                <input type="text" formControlName= "reportid" matInput>
            </mat-form-field>

            <label for="name">Report Data Id</label>
            <mat-form-field appearance="outline" style="margin-bottom: 10px;">
                <input type="text" formControlName= "reportsourceid" matInput>
            </mat-form-field>

            <label for="name">Workspace Id</label>
            <mat-form-field appearance="outline" style="margin-bottom: 10px;">
                <input type="text" formControlName= "workspaceid" matInput>
            </mat-form-field>
         
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                <button mat-raised-button  class="btn" [disabled] = "form.invalid" (click)="addReport()">
                    Submit
                    <!-- <app-button-loader *ngIf="loading"></app-button-loader> -->
                </button>
            </div>
        </form>  
    </div>
</div>
