<div class="root">
    <div class="top-bar">
        <div class="flex-btw full-width">
            <div class="top-head">Report Management</div>
            <button mat-flat-button color="primary" (click)="embedReport()">Embed Reports</button>
        </div>
    </div>

    <div class="body-wrap">
        <div style="display: flex; gap: 10px; align-items: center;">
            <div class="admin-table-search">
                <div class="search-icon">
                    <i class="ph ph-magnifying-glass"></i>
                </div>
                <input type="text" matInput placeholder="Search reports" [(ngModel)]="searchKey"
                    style="font-size: small;" (keyup)="applyFilters()">
            </div>
            <button mat-icon-button class="icon-button" (click)="getReport()" matTooltip="Refresh">
                <i class="ph ph-arrows-clockwise"></i>
            </button>
        </div>

        <div class="table-wrapper custom-scroll-bar" style="max-height: 65vh;">
            <div *ngIf="loading"
                style="display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 20px auto; height: 55vh;">
                <app-loader></app-loader>
                <div style="font-size: 14px; margin-top: 10px; font-weight: 500; color: var(--primary-color);">
                    Just wait a moment...</div>
            </div>

            <div class="flex-center" style="height: 40vh;"
                *ngIf="!loading && reportList.length === 0 && !reportError">
                <div class="empty-root">
                    <img src="assets/svg/reportempty.svg" alt="empty state image">
                    <div class="empty-state-header">No Reports Found</div>
                </div>
            </div>

            <div class="error-block" style="height: 60vh;" *ngIf="!loading && reportError">
                <app-empty-list></app-empty-list>
                <button mat-flat-button color="primary" style="padding: 0 60px;" (click)="getReport()">
                    Refresh
                </button>
            </div>

            <table mat-table [dataSource]="listData" class="full-width table mat-elevation-z8" aria-label="reports"
                [ngClass]="{hideElement: reportList.length === 0 || loading || reportError}">

                <ng-container matColumnDef="name">
                    <th mat-header-cell *matHeaderCellDef>Report Name</th>
                    <td mat-cell *matCellDef="let row">
                        <span style="font-weight: 500;">{{row.reportname}}</span>
                    </td>
                </ng-container>

                <ng-container matColumnDef="type">
                    <th mat-header-cell *matHeaderCellDef>Type</th>
                    <td mat-cell *matCellDef="let row">
                        <span style="text-transform: capitalize;">
                            {{row.reporttype?.reportTypeName || row.reporttype || '—'}}
                        </span>
                    </td>
                </ng-container>

                <ng-container matColumnDef="status">
                    <th mat-header-cell *matHeaderCellDef>Status</th>
                    <td mat-cell *matCellDef="let row">
                        <span [ngClass]="{'approve': row.status === 'enabled', 'reject': row.status !== 'enabled'}">
                            {{row.status | titlecase}}
                        </span>
                    </td>
                </ng-container>

                <ng-container matColumnDef="platform">
                    <th mat-header-cell *matHeaderCellDef>Platform</th>
                    <td mat-cell *matCellDef="let row">
                        <span>{{row.reportPlatform || '—'}}</span>
                    </td>
                </ng-container>

                <ng-container matColumnDef="action">
                    <th mat-header-cell *matHeaderCellDef></th>
                    <td mat-cell *matCellDef="let row" align="right">
                        <button mat-icon-button [matMenuTriggerFor]="actionMenu"
                            [disabled]="statusLoadingId === row._id">
                            <app-button-loader *ngIf="statusLoadingId === row._id"></app-button-loader>
                            <mat-icon *ngIf="statusLoadingId !== row._id">more_vert</mat-icon>
                        </button>
                        <mat-menu #actionMenu="matMenu">
                            <button mat-menu-item (click)="manageUserAccess(row)">
                                <div style="display: flex; align-items: center; color: var(--header-color);">
                                    <i class="ph-bold ph-user-gear"></i>
                                    <span style="font-size: 12px; margin-left: 10px;">Manage User Access</span>
                                </div>
                            </button>
                            <button mat-menu-item (click)="inviteExternalUser(row)">
                                <div style="display: flex; align-items: center; color: var(--header-color);">
                                    <i class="ph-bold ph-user-plus"></i>
                                    <span style="font-size: 12px; margin-left: 10px;">Invite External User</span>
                                </div>
                            </button>
                            <button mat-menu-item (click)="manageGroupAccess(row)">
                                <div style="display: flex; align-items: center; color: var(--header-color);">
                                    <i class="ph-bold ph-users-three"></i>
                                    <span style="font-size: 12px; margin-left: 10px;">Manage Group Access</span>
                                </div>
                            </button>
                            <button mat-menu-item (click)="updateStatus(row)">
                                <div style="display: flex; align-items: center;"
                                    [style.color]="row.status === 'enabled' ? 'orangered' : 'green'">
                                    <i [class]="row.status === 'enabled' ? 'ph-bold ph-plugs-connected' : 'ph-bold ph-plugs'"></i>
                                    <span style="font-size: 12px; margin-left: 10px;">
                                        {{row.status === 'enabled' ? 'Disable Report' : 'Enable Report'}}
                                    </span>
                                </div>
                            </button>
                            <button mat-menu-item (click)="delete(row)">
                                <div style="display: flex; align-items: center; color: orangered;">
                                    <i class="ph-bold ph-trash"></i>
                                    <span style="font-size: 12px; margin-left: 10px;">Delete Report</span>
                                </div>
                            </button>
                        </mat-menu>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
            <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons
                [ngClass]="{hideElement: reportList.length === 0 || loading || reportError}">
            </mat-paginator>
        </div>
    </div>
</div>
