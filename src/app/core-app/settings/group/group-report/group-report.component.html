<div class="root">
    <ng-container *ngIf="reportView">
        <div class="top-wrapper" style="gap: 30px;">
            <div class="popups-wrap">
                <span class="popup-header">Group Reports</span>
                <span class="header-text">The reports that can be accessed by <strong>{{selectedRow.name}}</strong>
                    group</span>
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <button mat-flat-button (click)="addReport()" *ngIf="selectedRow.isAdmin">Add Report</button>
                <i class="ph-duotone ph-x cancel" (click)="close()"></i>
            </div>
        </div>

        <div style="margin-top: 20px; height: 40vh;" class="custom-scroll-bar">
            <div *ngIf="loading">
                <ngx-skeleton-loader appearance="line" count="6" [theme]="{height: '30px'}"></ngx-skeleton-loader>
            </div>

            <div class="flex-center" style="height: 40vh;" *ngIf="!loading && userList.length === 0">
                <div class="empty-root">
                    <img src="assets/newbrandimg/empty-connector-list 1.png" class="empty-state-image"
                        alt="empty state image">
                    &nbsp;
                    <div class="empty-state-header">No Reports Assigned</div>
                </div>
            </div>

            <table [ngClass]="{hideElement: userList?.length == 0 || loading}" mat-table [dataSource]="userData"
                class="full-width" aria-label="rows">

                <ng-container matColumnDef="name">
                    <th mat-header-cell *matHeaderCellDef>Report Name</th>
                    <td mat-cell *matCellDef="let row">
                        <span>
                            {{row.reportname}}
                        </span>
                    </td>
                </ng-container>

                <ng-container matColumnDef="action">
                    <th mat-header-cell *matHeaderCellDef style="text-align: right;">Action
                    <th>
                    <td mat-cell *matCellDef="let row" style="text-align: center;">
                        <div class="flex-end" *ngIf="selectedRow.isAdmin">
                            <app-primary-button-loader *ngIf="row.loading"></app-primary-button-loader>
                            <ng-container *ngIf="!row.loading">
                                <div class="circle red" (click)="action('revoke', row)" matTooltip="Remove report">
                                    <i class="ph ph-trash"></i>
                                </div>
                            </ng-container>
                        </div>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky :true"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
        </div>
    </ng-container>

    <ng-container *ngIf="!reportView">
        <div class="top-wrapper">

            <div class="flex-el" style="gap: 20px;">
                <div (click)="reportView = true" style="cursor: pointer;">
                    <mat-icon>keyboard_arrow_left</mat-icon>
                </div>

                <div class="popups-wrap">
                    <span class="popup-header">Select Reports</span>
                    <span class="header-text">Select reports that can be accessed by
                        <strong>{{selectedRow.name}}</strong>
                        group</span>
                </div>
            </div>
            <!-- <div style="display: flex; align-items: center; gap: 20px;">
                <button mat-flat-button (click)="addReport()">Add Report</button>
                <i class="ph-duotone ph-x cancel" (click)="close()"></i>
            </div> -->
        </div>
        <div style="margin-top: 20px; height: 40vh;" class="custom-scroll-bar">
            <div *ngIf="loading2">
                <ngx-skeleton-loader appearance="line" count="6" [theme]="{height: '30px'}"></ngx-skeleton-loader>
            </div>

            <div class="flex-center" style="height: 40vh;" *ngIf="!loading2 && userList2.length === 0">
                <div class="empty-root">
                    <img src="assets/newbrandimg/empty-connector-list 1.png" class="empty-state-image"
                        alt="empty state image">
                    &nbsp;
                    <div class="empty-state-header">No reports found</div>
                </div>
            </div>

            <table [ngClass]="{hideElement: userList2?.length == 0 || loading2}" mat-table [dataSource]="userData2"
                class="full-width" aria-label="rows">

                <ng-container matColumnDef="name">
                    <th mat-header-cell *matHeaderCellDef>Report Name</th>
                    <td mat-cell *matCellDef="let row">
                        <span>
                            {{row.reportname}}
                        </span>
                    </td>
                </ng-container>

                <ng-container matColumnDef="org">
                    <th mat-header-cell *matHeaderCellDef style="text-align: right;">Action
                    <th>
                    <td mat-cell *matCellDef="let row" style="text-align: center;">
                        <div class="flex-end">
                            <app-primary-button-loader *ngIf="row.loading"></app-primary-button-loader>
                            <ng-container *ngIf="!row.loading">
                                <div class="circle green" (click)="action('grant', row)" matTooltip="Add Report">
                                    <i class="ph ph-check"></i>
                                </div>
                            </ng-container>
                        </div>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns2; sticky :true"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns2;"></tr>
            </table>
        </div>
    </ng-container>
</div>
