<div class="root">
    <div class="top-bar">
        <span class="top-head">Settings</span>
    </div>
    <mat-tab-group animationDuration="0ms" class="body-wrap">
        <mat-tab label="Basic Connectors">
            <ng-template mat-tab-label>
                Report Configuration
            </ng-template>
            <ng-template matTabContent>
               <app-report-config></app-report-config>
            </ng-template>

        </mat-tab>
        <mat-tab label="Custom Connectors">
            <ng-template mat-tab-label>
                Catalog
            </ng-template>
            <ng-template matTabContent>
                <p>catalog!</p>
            </ng-template>

        </mat-tab>
    </mat-tab-group>
</div>
