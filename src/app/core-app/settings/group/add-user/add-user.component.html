<div class="root">
    <div class="top-wrapper">
        <div class="popups-wrap">
            <span class="popup-header">Add Member</span>
            <span class="header-text">The following users can be added to <strong>{{selectedRow.name}}</strong> group</span>
        </div>
        <i class="ph-duotone ph-x cancel" (click)="close()"></i>
    </div>

    <div style="margin-top: 20px; height: 40vh;" class="custom-scroll-bar">
        <div *ngIf="loading">
            <ngx-skeleton-loader appearance="line" count="6" [theme]="{height: '30px'}"></ngx-skeleton-loader>
        </div>

        <div class="flex-center" style="height: 40vh;" *ngIf="!loading && userList.length === 0">
            <div class="empty-root">
                <img src="assets/newbrandimg/empty-connector-list 1.png" class="empty-state-image"
                    alt="empty state image">
                &nbsp;
                <div class="empty-state-header">No Requests</div>
            </div>
        </div>

        <table [ngClass]="{hideElement: userList?.length == 0 || loading}" mat-table [dataSource]="userData"
        class="full-width" aria-label="rows">

        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Email</th>
            <td mat-cell *matCellDef="let row">
                <span>
                    {{row.useremail}}
                </span>
            </td>
        </ng-container> 

        <ng-container matColumnDef="org">
            <th mat-header-cell *matHeaderCellDef style="text-align: right;">Action<th>
            <td mat-cell *matCellDef="let row" style="text-align: center;">
                <div class="flex-end">
                    <app-primary-button-loader *ngIf="row.loading"></app-primary-button-loader>
                    <ng-container *ngIf="!row.loading">
                        <div class="circle green" (click)="action('accept', row)" matTooltip="Add Member">
                            <i class="ph ph-check"></i>
                        </div>
                        <!-- <div class="circle red" (click)="action('deny', row)">
                            <i class="ph ph-x"></i>
                        </div> -->
                    </ng-container>
                </div>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky :true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    </div>
</div>
